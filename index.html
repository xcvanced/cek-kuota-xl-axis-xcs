<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efeff2;
  --card:#ffffff;
  --text:#111111;
  --muted:#8f8f8f;
  --line:#e6e6e6;
  --soft:#f7f7f8;
  --err-bg:#ffffff;
  --err-line:#dddddd;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  padding:14px 12px 20px;
  color:var(--text);
}

.wrap{
  max-width:420px;
  margin:auto;
}

.hero{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.hero-icon{
  width:52px;
  height:52px;
  border-radius:16px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  flex-shrink:0;
}

.hero-title{
  font-size:13.5px;
  font-weight:800;
  line-height:1.35;
}

.hero-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
}

.input-box{
  position:relative;
  margin-bottom:10px;
}

.input-box i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  color:#aaa;
}

input{
  width:100%;
  height:44px;
  border-radius:16px;
  border:1.5px solid var(--line);
  padding:0 14px 0 40px;
  font-size:12.5px;
  outline:none;
  font-family:inherit;
  color:var(--text);
  background:#fff;
}

input::placeholder{
  color:#a8a8a8;
}

button{
  width:100%;
  height:46px;
  border:none;
  border-radius:18px;
  background:#111;
  color:#fff;
  font-size:13px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
  font-family:inherit;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

button i{
  font-size:12px;
}

.result{
  margin-top:10px;
}

.section{
  margin-top:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
}

.section-title{
  font-size:12px;
  font-weight:800;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:7px;
}

.section-title i{
  font-size:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.info-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px 11px;
  min-width:0;
}

.info-label{
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:4px;
  line-height:1.35;
}

.info-value{
  font-size:12.5px;
  font-weight:700;
  line-height:1.45;
  word-break:break-word;
  color:var(--text);
}

.package-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.package-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.package-name{
  font-size:12.5px;
  font-weight:800;
  line-height:1.45;
  margin-bottom:8px;
  word-break:break-word;
}

.package-quota-name{
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:8px;
  line-height:1.35;
}

.package-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
  font-size:10.5px;
  color:var(--muted);
  line-height:1.45;
}

.package-right{
  text-align:right;
  font-weight:600;
}

.progress{
  width:100%;
  height:8px;
  background:#dddddd;
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#111;
  border-radius:999px;
  transition:width .3s ease;
}

.status{
  margin-top:10px;
  padding:10px 11px;
  border-radius:14px;
  font-size:12px;
  display:flex;
  gap:6px;
  align-items:center;
  line-height:1.5;
}

.status i{
  font-size:12px;
  flex-shrink:0;
}

.err{
  background:var(--err-bg);
  border:1px solid var(--err-line);
}

.footer{
  text-align:center;
  font-size:11px;
  color:#9a9a9a;
  margin-top:14px;
}

.empty-text{
  font-size:11px;
  color:var(--muted);
  line-height:1.5;
}

@media(max-width:400px){
  .grid{
    grid-template-columns:1fr 1fr;
    gap:7px;
  }

  .info-label{
    font-size:10px;
  }

  .info-value{
    font-size:12px;
  }

  .package-meta{
    flex-direction:column;
    align-items:flex-start;
  }

  .package-right{
    text-align:left;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-icon">
      <i class="fa-solid fa-signal"></i>
    </div>
    <div>
      <div class="hero-title">Cek Kuota XL & AXIS</div>
      <div class="hero-sub">by XC-Store Apps</div>
    </div>
  </div>

  <div class="card">
    <div class="input-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="nomor" type="tel" placeholder="Cari nomor XL / AXIS..." />
    </div>

    <button id="btnCek" onclick="cek()">
      <i class="fa-solid fa-paper-plane"></i>
      Cek Kuota
    </button>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">Powered by XC-Store</div>

</div>

<script>
function normalizeNumber(input){
  let n = String(input || '').trim().replace(/\D/g,'');
  if(n.startsWith('0')) n = '62' + n.slice(1);
  return n;
}

function escapeHtml(text){
  return String(text ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function infoCard(label, value){
  return `
    <div class="info-card">
      <div class="info-label">${label}</div>
      <div class="info-value">${value}</div>
    </div>
  `;
}

function volteValue(volte, key){
  if(!volte || typeof volte !== 'object') return '-';
  const val = volte[key];
  if(val === true) return 'Ya';
  if(val === false) return 'Tidak';
  return val ? String(val) : '-';
}

function parsePercent(value){
  const n = parseFloat(String(value ?? '').replace(',', '.').replace(/[^\d.]/g, ''));
  if(isNaN(n)) return 0;
  return Math.max(0, Math.min(100, n));
}

function renderPackages(packages){
  if(!Array.isArray(packages) || !packages.length){
    return `<div class="empty-text">Paket data tidak ditemukan.</div>`;
  }

  return `
    <div class="package-list">
      ${packages.map(pkg => {
        const quota = Array.isArray(pkg.quotas) && pkg.quotas.length ? pkg.quotas[0] : {};
        const percent = parsePercent(quota.percent);
        const quotaName = quota.name || '-';
        const remaining = quota.remaining || '-';
        const total = quota.total || '-';

        return `
          <div class="package-card">
            <div class="package-name">${escapeHtml(pkg.name || '-')}</div>
            <div class="package-quota-name">${escapeHtml(quotaName)}</div>

            <div class="package-meta">
              <div>Expired: ${escapeHtml(pkg.expiry || '-')}</div>
              <div class="package-right">Sisa: ${escapeHtml(remaining)} / Total: ${escapeHtml(total)}</div>
            </div>

            <div class="progress">
              <div class="bar" style="width:${percent}%"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

async function cek(){
  const input = document.getElementById('nomor');
  const btn = document.getElementById('btnCek');
  const resBox = document.getElementById('result');

  const nomor = normalizeNumber(input.value);

  if(!nomor){
    resBox.innerHTML = `
      <div class="status err">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>Nomor belum diisi</span>
      </div>
    `;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;

  resBox.innerHTML = `
    <div class="status">
      <i class="fa-solid fa-rotate fa-spin"></i>
      <span>Sedang mengambil data...</span>
    </div>
  `;

  try{
    const res = await fetch('/api/cek?number=' + encodeURIComponent(nomor));
    const raw = await res.text();

    let data;
    try{
      data = JSON.parse(raw);
    }catch{
      resBox.innerHTML = `
        <div class="status err">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span>Response API bukan JSON valid</span>
        </div>
      `;
      return;
    }

    if(!data.success){
      resBox.innerHTML = `
        <div class="status err">
          <i class="fa-solid fa-circle-xmark"></i>
          <span>${escapeHtml(data.message || 'Gagal mengambil data')}</span>
        </div>
      `;
      return;
    }

    const root = data.data || {};
    const s = root.subs_info || {};
    const v = s.volte || {};
    const packages = root.package_info?.packages || [];

    resBox.innerHTML = `
      <div class="section">
        <div class="section-title">
          <i class="fa-solid fa-sim-card"></i>
          Informasi Nomor
        </div>

        <div class="grid">
          ${infoCard('Nomor', escapeHtml(s.msisdn || nomor))}
          ${infoCard('Operator', escapeHtml(s.operator || '-'))}
          ${infoCard('Jaringan', escapeHtml(s.net_type || '-'))}
          ${infoCard('Registrasi (Verif ID)', escapeHtml(s.id_verified || '-'))}
          ${infoCard('Umur Kartu', escapeHtml(s.tenure || '-'))}
          ${infoCard('Masa Aktif', escapeHtml(s.exp_date || '-'))}
          ${infoCard('Masa Tenggang', escapeHtml(s.grace_until || '-'))}
          ${infoCard('Volte Area', escapeHtml(volteValue(v, 'area')))}
          ${infoCard('Volte Simcard', escapeHtml(volteValue(v, 'simcard')))}
          ${infoCard('Volte Perangkat', escapeHtml(volteValue(v, 'device')))}
        </div>
      </div>

      <div class="section">
        <div class="section-title">
          <i class="fa-solid fa-box-open"></i>
          Paket Data
        </div>

        ${renderPackages(packages)}
      </div>
    `;
  }catch(e){
    resBox.innerHTML = `
      <div class="status err">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Error ambil data</span>
      </div>
    `;
  }finally{
    btn.disabled = false;
    btn.innerHTML = `
      <i class="fa-solid fa-paper-plane"></i>
      Cek Kuota
    `;
  }
}
</script>
</body>
</html>
