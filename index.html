<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efeff2;
  --card:#ffffff;
  --text:#111111;
  --muted:#8f8f8f;
  --line:#e6e6e6;
  --soft:#f7f7f8;
  --ok-bg:#f4f4f4;
  --err-bg:#ffffff;
  --err-line:#dddddd;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  padding:14px 12px 20px;
  color:var(--text);
}

.wrap{
  max-width:420px;
  margin:auto;
}

.hero{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.hero-icon{
  width:52px;
  height:52px;
  border-radius:16px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  flex-shrink:0;
}

.hero-title{
  font-size:13.5px;
  font-weight:800;
  line-height:1.35;
}

.hero-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
}

.input-box{
  position:relative;
  margin-bottom:10px;
}

.input-box i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  color:#aaa;
}

input{
  width:100%;
  height:44px;
  border-radius:16px;
  border:1.5px solid var(--line);
  padding:0 14px 0 40px;
  font-size:12.5px;
  outline:none;
  font-family:inherit;
  color:var(--text);
  background:#fff;
}

input::placeholder{
  color:#a8a8a8;
}

button{
  width:100%;
  height:46px;
  border:none;
  border-radius:18px;
  background:#111;
  color:#fff;
  font-size:13px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
  font-family:inherit;
}

button:disabled{
  opacity:.7;
  cursor:not-allowed;
}

button i{
  font-size:12px;
}

.result{
  margin-top:10px;
}

.status{
  margin-top:10px;
  padding:10px 11px;
  border-radius:14px;
  font-size:12px;
  display:flex;
  gap:6px;
  align-items:center;
  line-height:1.5;
}

.status i{
  font-size:12px;
  flex-shrink:0;
}

.ok{
  background:var(--ok-bg);
}

.err{
  background:var(--err-bg);
  border:1px solid var(--err-line);
}

.info-card{
  margin-top:8px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:11px 12px;
}

.info-label{
  font-size:10.5px;
  color:var(--muted);
  margin-bottom:4px;
  line-height:1.4;
}

.info-value{
  font-size:13px;
  font-weight:700;
  line-height:1.45;
  word-break:break-word;
  color:var(--text);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.progress-wrap{
  margin-top:8px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:11px 12px;
}

.progress-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
  font-size:11px;
  font-weight:700;
}

.progress{
  width:100%;
  height:7px;
  background:#e3e3e3;
  border-radius:999px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#111;
  border-radius:999px;
  transition:width .3s ease;
}

.footer{
  text-align:center;
  font-size:11px;
  color:#9a9a9a;
  margin-top:14px;
}

@media(max-width:400px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="hero">
    <div class="hero-icon">
      <i class="fa-solid fa-signal"></i>
    </div>
    <div>
      <div class="hero-title">Cek Kuota XL & AXIS</div>
      <div class="hero-sub">by XC-Store Apps</div>
    </div>
  </div>

  <div class="card">
    <div class="input-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="nomor" type="tel" placeholder="Cari nomor XL / AXIS..." />
    </div>

    <button id="btnCek" onclick="cek()">
      <i class="fa-solid fa-paper-plane"></i>
      Cek Kuota
    </button>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">Powered by XC-Store</div>

</div>

<script>
function normalizeNumber(input){
  let n = String(input || '').trim().replace(/\D/g,'');
  if(n.startsWith('0')) n = '62' + n.slice(1);
  return n;
}

function escapeHtml(text){
  return String(text ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function toPercent(value){
  const n = parseFloat(String(value ?? '').replace(/[^\d.]/g,''));
  if(isNaN(n)) return 0;
  return Math.max(0, Math.min(100, n));
}

function infoCard(label, value){
  return `
    <div class="info-card">
      <div class="info-label">${label}</div>
      <div class="info-value">${value}</div>
    </div>
  `;
}

async function cek(){
  const input = document.getElementById('nomor');
  const btn = document.getElementById('btnCek');
  const resBox = document.getElementById('result');

  const nomor = normalizeNumber(input.value);

  if(!nomor){
    resBox.innerHTML = `
      <div class="status err">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>Nomor belum diisi</span>
      </div>
    `;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;

  resBox.innerHTML = `
    <div class="status ok">
      <i class="fa-solid fa-rotate fa-spin"></i>
      <span>Sedang mengambil data...</span>
    </div>
  `;

  try{
    const res = await fetch('/api/cek?number=' + encodeURIComponent(nomor));
    const raw = await res.text();

    let data;
    try{
      data = JSON.parse(raw);
    }catch{
      resBox.innerHTML = `
        <div class="status err">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span>Response API bukan JSON valid</span>
        </div>
      `;
      return;
    }

    if(!data.success){
      resBox.innerHTML = `
        <div class="status err">
          <i class="fa-solid fa-circle-xmark"></i>
          <span>${escapeHtml(data.message || 'Gagal mengambil data')}</span>
        </div>
      `;
      return;
    }

    const s = data.data?.subs_info || {};
    const p = data.data?.package_info?.packages?.[0] || {};
    const q = p?.quotas?.[0] || {};

    const percent = toPercent(q.percent);

    resBox.innerHTML = `
      <div class="status ok">
        <i class="fa-solid fa-circle-check"></i>
        <span>Data berhasil diambil</span>
      </div>

      <div class="grid">
        ${infoCard('Nomor', escapeHtml(s.msisdn || nomor))}
        ${infoCard('Operator', escapeHtml(s.operator || '-'))}
        ${infoCard('Jaringan', escapeHtml(s.net_type || '-'))}
        ${infoCard('Masa Aktif', escapeHtml(s.exp_date || '-'))}
        ${infoCard('Paket', escapeHtml(p.name || '-'))}
        ${infoCard('Total Kuota', escapeHtml(q.total || '-'))}
        ${infoCard('Sisa Kuota', escapeHtml(q.remaining || '-'))}
        ${infoCard('Sisa Persen', escapeHtml(percent + '%'))}
      </div>

      <div class="progress-wrap">
        <div class="progress-head">
          <span>Progress Kuota</span>
          <span>${escapeHtml(percent + '%')}</span>
        </div>
        <div class="progress">
          <div class="bar" style="width:${percent}%"></div>
        </div>
      </div>
    `;
  }catch(e){
    resBox.innerHTML = `
      <div class="status err">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>Error ambil data</span>
      </div>
    `;
  }finally{
    btn.disabled = false;
    btn.innerHTML = `
      <i class="fa-solid fa-paper-plane"></i>
      Cek Kuota
    `;
  }
}
</script>
</body>
</html>
