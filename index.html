<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efeff2;
  --card:#ffffff;
  --text:#111;
  --muted:#8f8f8f;
  --line:#e6e6e6;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  padding:14px 12px;
}

.wrap{
  max-width:420px;
  margin:auto;
}

/* HERO */
.hero{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.hero-icon{
  width:52px;
  height:52px;
  border-radius:16px;
  background:#111;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.hero-title{
  font-size:13.5px;
  font-weight:800;
}

.hero-sub{
  font-size:11px;
  color:var(--muted);
}

/* CARD */
.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
}

/* INPUT */
.input-box{
  position:relative;
  margin-bottom:10px;
}

.input-box i{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  color:#aaa;
}

input{
  width:100%;
  height:44px;
  border-radius:16px;
  border:1.5px solid var(--line);
  padding:0 14px 0 40px;
  font-size:12.5px;
  outline:none;
  font-family:inherit;
}

input::placeholder{
  color:#a8a8a8;
}

/* BUTTON */
button{
  width:100%;
  height:46px;
  border:none;
  border-radius:18px;
  background:#111;
  color:#fff;
  font-size:13px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
}

button:disabled{
  opacity:.7;
}

button i{
  font-size:12px;
}

/* RESULT */
.result{
  margin-top:10px;
}

/* STATUS */
.status{
  margin-top:10px;
  padding:10px 11px;
  border-radius:14px;
  font-size:12px;
  display:flex;
  gap:6px;
  align-items:center;
}

.status i{
  font-size:12px;
}

.ok{
  background:#f4f4f4;
}

.err{
  background:#fff;
  border:1px solid #ddd;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:11px;
  color:#9a9a9a;
  margin-top:14px;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-icon">
      <i class="fa-solid fa-signal"></i>
    </div>
    <div>
      <div class="hero-title">Cek Kuota XL & AXIS</div>
      <div class="hero-sub">by XC-Store Apps</div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <div class="input-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="nomor" placeholder="Cari nomor XL / AXIS..." />
    </div>

    <button id="btnCek" onclick="cek()">
      <i class="fa-solid fa-paper-plane"></i>
      Cek Kuota
    </button>

    <div id="result" class="result"></div>
  </div>

  <div class="footer">Powered by XC-Store</div>

</div>

<script>
function normalizeNumber(input){
  let n=String(input||'').replace(/\D/g,'');
  if(n.startsWith('0')) n='62'+n.slice(1);
  return n;
}

async function cek(){
  const input=document.getElementById('nomor');
  const btn=document.getElementById('btnCek');
  const resBox=document.getElementById('result');

  const nomor=normalizeNumber(input.value);

  if(!nomor){
    resBox.innerHTML=`<div class="status err"><i class="fa-solid fa-circle-exclamation"></i> Nomor belum diisi</div>`;
    return;
  }

  btn.disabled=true;
  btn.innerHTML=`<i class="fa-solid fa-spinner fa-spin"></i>`;

  try{
    const res=await fetch(`/api/cek?number=${nomor}`);
    const data=await res.json();

    if(!data.success){
      resBox.innerHTML=`<div class="status err">${data.message}</div>`;
      return;
    }

    resBox.innerHTML=`
      <div class="status ok">
        <i class="fa-solid fa-circle-check"></i>
        Data berhasil diambil
      </div>
    `;
  }catch(e){
    resBox.innerHTML=`<div class="status err">Error</div>`;
  }

  btn.disabled=false;
  btn.innerHTML=`<i class="fa-solid fa-paper-plane"></i> Cek Kuota`;
}
</script>

</body>
</html>
