<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cek Kuota XL & AXIS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f7f2;
      --card: #ffffff;
      --text: #111111;
      --text-soft: #6b7280;
      --line: #ececec;
      --yellow: #facc15;
      --yellow-dark: #eab308;
      --black: #111111;
      --soft-black: #1f1f1f;
      --soft-yellow: #fff9db;
      --success-bg: #f6fef9;
      --success-text: #166534;
      --error-bg: #fff5f5;
      --error-text: #b42318;
      --shadow: 0 10px 30px rgba(17, 17, 17, 0.08);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.16), transparent 28%),
        linear-gradient(180deg, #fffef8 0%, #f5f5ef 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 14px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrapper {
      width: 100%;
      max-width: 430px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(17, 17, 17, 0.06);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 24px 20px 20px;
      background:
        linear-gradient(135deg, #111111 0%, #1f1f1f 100%);
      color: #fff;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: rgba(250, 204, 21, 0.18);
      border-radius: 50%;
      filter: blur(8px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff8cc;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .4px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.8);
    }

    h2 {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .sub {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .content {
      padding: 18px;
    }

    .input-wrap {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-box {
      position: relative;
    }

    input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      transition: .2s ease;
    }

    input:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.14);
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--yellow) 0%, var(--yellow-dark) 100%);
      color: var(--black);
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 10px 18px rgba(250, 204, 21, 0.25);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 16px;
    }

    .box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px;
      margin-top: 12px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: var(--black);
      margin-bottom: 12px;
    }

    .title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .item {
      background: #fafafa;
      border: 1px solid #efefef;
      border-radius: 14px;
      padding: 11px 12px;
    }

    .item small {
      display: block;
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .item strong {
      display: block;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }

    .progress-wrap {
      margin-top: 14px;
      padding: 12px;
      background: var(--soft-yellow);
      border: 1px solid rgba(250, 204, 21, 0.28);
      border-radius: 14px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--black);
    }

    .progress {
      width: 100%;
      height: 10px;
      background: rgba(17, 17, 17, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #111111 0%, #2d2d2d 100%);
      border-radius: 999px;
      transition: width .35s ease;
    }

    .bar.red {
      background: linear-gradient(90deg, #dc2626 0%, #b91c1c 100%);
    }

    .bar.orange {
      background: linear-gradient(90deg, #f59e0b 0%, #ea580c 100%);
    }

    .muted {
      color: var(--text-soft);
      font-size: 12px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .status {
      margin-top: 12px;
      padding: 13px 14px;
      border-radius: 15px;
      font-size: 13px;
      line-height: 1.65;
      font-weight: 600;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .ok {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid #d1fadf;
    }

    .err {
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fecdca;
    }

    .loading-box {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }

    .loading-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 1s infinite ease-in-out;
      flex-shrink: 0;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-soft);
      margin-top: 14px;
      line-height: 1.5;
      padding-bottom: 2px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: .55; }
    }

    @media (max-width: 420px) {
      .hero {
        padding: 22px 16px 18px;
      }

      .content {
        padding: 14px;
      }

      h2 {
        font-size: 21px;
      }

      .sub {
        font-size: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .item strong {
        font-size: 12.5px;
      }

      button,
      input {
        height: 52px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="hero">
        <div class="brand">
          <span class="brand-dot"></span>
          XC-STORE CHECKER
        </div>
        <h2>Cek Kuota XL & AXIS</h2>
        <p class="sub">Masukkan nomor XL atau AXIS untuk melihat informasi kartu, paket aktif, dan sisa kuota secara praktis.</p>
      </div>

      <div class="content">
        <div class="input-wrap">
          <label class="label" for="nomor">Nomor Tujuan</label>
          <div class="input-box">
            <input id="nomor" type="tel" placeholder="Contoh: 0817xxxx atau 62817xxxx" />
          </div>
        </div>

        <button id="btnCek" onclick="cek()">Cek Kuota</button>

        <div class="result" id="result"></div>
        <div class="footer-note">Powered by XC-Store</div>
      </div>
    </div>
  </div>

  <script>
    function normalizeNumber(input) {
      let n = String(input || '').trim().replace(/\D/g, '');
      if (!n) return '';
      if (n.startsWith('0')) n = '62' + n.slice(1);
      return n;
    }

    function parseGB(value) {
      if (!value) return 0;
      const clean = String(value).trim().toUpperCase().replace(',', '.');
      const num = parseFloat(clean.replace(/[^\d.]/g, ''));
      if (isNaN(num)) return 0;
      if (clean.includes('MB')) return num / 1024;
      if (clean.includes('KB')) return num / (1024 * 1024);
      return num;
    }

    function formatGB(n) {
      if (!isFinite(n)) return '-';
      if (n >= 1) return n.toFixed(n % 1 === 0 ? 0 : 2).replace(/\.00$/, '') + ' GB';
      return (n * 1024).toFixed(0) + ' MB';
    }

    function parseDDMMYYYY(str) {
      if (!str) return null;
      const p = str.split('-');
      if (p.length !== 3) return null;
      return new Date(`${p[2]}-${p[1]}-${p[0]}T23:59:59`);
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function cek() {
      const input = document.getElementById('nomor');
      const btn = document.getElementById('btnCek');
      const resBox = document.getElementById('result');

      const nomor = normalizeNumber(input.value);

      if (!nomor) {
        resBox.innerHTML = `<div class="status err">Nomor belum diisi.</div>`;
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      resBox.innerHTML = `
        <div class="box">
          <div class="loading-box">
            <span class="loading-dot"></span>
            <span>Sedang mengambil data kuota...</span>
          </div>
        </div>
      `;

      try {
        const url = `/api/cek?number=${encodeURIComponent(nomor)}`;
        const res = await fetch(url);
        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          resBox.innerHTML = `<div class="status err">Response bukan JSON valid.\n\n${escapeHtml(raw)}</div>`;
          return;
        }

        if (!data.success) {
          resBox.innerHTML = `<div class="status err">${escapeHtml(data.message || 'Gagal mengambil data.')}</div>`;
          return;
        }

        const root = data.data || {};
        const subs = root.subs_info || {};
        const packageInfo = root.package_info || {};
        const packages = Array.isArray(packageInfo.packages) ? packageInfo.packages : [];

        if (!packages.length) {
          resBox.innerHTML = `
            <div class="box">
              <div class="title">Informasi Nomor</div>
              <div class="grid">
                <div class="item"><small>Nomor</small><strong>${escapeHtml(subs.msisdn || nomor)}</strong></div>
                <div class="item"><small>Operator</small><strong>${escapeHtml(subs.operator || '-')}</strong></div>
                <div class="item"><small>Jaringan</small><strong>${escapeHtml(subs.net_type || '-')}</strong></div>
                <div class="item"><small>Masa Aktif</small><strong>${escapeHtml(subs.exp_date || '-')}</strong></div>
              </div>
            </div>
            <div class="status err">${escapeHtml(packageInfo.error_message || 'Paket tidak ditemukan pada nomor ini.')}</div>
          `;
          return;
        }

        const pkg = packages[0];
        const quota = Array.isArray(pkg.quotas) && pkg.quotas.length ? pkg.quotas[0] : {};

        const totalGB = parseGB(quota.total);
        const remainingGB = parseGB(quota.remaining);
        const usedGB = Math.max(0, totalGB - remainingGB);

        let remainingPercent = Number(quota.percent);
        if (!isFinite(remainingPercent)) {
          remainingPercent = totalGB > 0 ? (remainingGB / totalGB) * 100 : 0;
        }

        const usedPercent = totalGB > 0 ? (usedGB / totalGB) * 100 : 0;
        const expDate = parseDDMMYYYY(pkg.expiry);
        const expired = expDate ? (new Date() > expDate) : false;

        let barClass = '';
        if (expired) barClass = 'red';
        else if (remainingPercent <= 20) barClass = 'orange';

        const volteText = subs.volte
          ? [
              subs.volte.device ? 'Device' : null,
              subs.volte.area ? 'Area' : null,
              subs.volte.simcard ? 'SIM' : null
            ].filter(Boolean).join(', ') || '-'
          : '-';

        resBox.innerHTML = `
          <div class="box">
            <div class="title">Informasi Nomor</div>
            <div class="grid">
              <div class="item"><small>Nomor</small><strong>${escapeHtml(subs.msisdn || nomor)}</strong></div>
              <div class="item"><small>Operator</small><strong>${escapeHtml(subs.operator || '-')}</strong></div>
              <div class="item"><small>Jaringan</small><strong>${escapeHtml(subs.net_type || '-')}</strong></div>
              <div class="item"><small>Verifikasi ID</small><strong>${escapeHtml(subs.id_verified || '-')}</strong></div>
              <div class="item"><small>Tenure</small><strong>${escapeHtml(subs.tenure || '-')}</strong></div>
              <div class="item"><small>Masa Aktif</small><strong>${escapeHtml(subs.exp_date || '-')}</strong></div>
              <div class="item"><small>Grace Until</small><strong>${escapeHtml(subs.grace_until || '-')}</strong></div>
              <div class="item"><small>VoLTE</small><strong>${escapeHtml(volteText)}</strong></div>
            </div>
          </div>

          <div class="box">
            <div class="title">Paket Aktif</div>
            <div class="grid">
              <div class="item"><small>Nama Paket</small><strong>${escapeHtml(pkg.name || '-')}</strong></div>
              <div class="item"><small>Expired Paket</small><strong>${escapeHtml(pkg.expiry || '-')}</strong></div>
              <div class="item"><small>Total Kuota</small><strong>${escapeHtml(quota.total || '-')}</strong></div>
              <div class="item"><small>Sisa Kuota</small><strong>${escapeHtml(quota.remaining || '-')}</strong></div>
              <div class="item"><small>Terpakai</small><strong>${escapeHtml(formatGB(usedGB))}</strong></div>
              <div class="item"><small>Sisa Persen</small><strong>${remainingPercent.toFixed(1)}%</strong></div>
            </div>

            <div class="progress-wrap">
              <div class="progress-head">
                <span>Progress sisa kuota</span>
                <span>${remainingPercent.toFixed(1)}%</span>
              </div>
              <div class="progress">
                <div class="bar ${barClass}" style="width:${remainingPercent}%"></div>
              </div>
            </div>

            <div class="muted">
              Terpakai sekitar ${usedPercent.toFixed(1)}% dari total kuota.
            </div>
          </div>

          <div class="status ok">
            ${expired
              ? 'Paket terdeteksi sudah expired.'
              : remainingPercent <= 20
                ? 'Paket aktif, tetapi sisa kuota sudah rendah.'
                : 'Paket aktif dan data berhasil diambil.'}
          </div>
        `;
      } catch (e) {
        resBox.innerHTML = `<div class="status err">Request gagal: ${escapeHtml(e.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cek Kuota';
      }
    }
  </script>
</body>
</html>
