<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efeff2;
  --card:#ffffff;
  --text:#111;
  --muted:#8f8f8f;
  --line:#e6e6e6;
  --soft:#f7f7f8;
  --green:#16a34a;
  --yellow:#ca8a04;
  --red:#dc2626;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  padding:14px;
}

.wrap{max-width:420px;margin:auto;}

.hero{
  background:#fff;
  border-radius:20px;
  padding:12px;
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.hero-icon{
  width:48px;height:48px;
  background:#111;color:#fff;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
}

.hero-title{
  font-size:12.5px;
  font-weight:800;
}

.hero-sub{
  font-size:10px;
  color:#888;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:12px;
}

.input-box{position:relative;margin-bottom:8px;}

.input-box i{
  position:absolute;
  left:12px;top:50%;
  transform:translateY(-50%);
  font-size:11px;color:#aaa;
}

input{
  width:100%;
  height:42px;
  border-radius:14px;
  border:1px solid var(--line);
  padding:0 12px 0 36px;
  font-size:11.5px;
}

button{
  width:100%;
  height:44px;
  border:none;border-radius:16px;
  background:#111;color:#fff;
  font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  gap:6px;
}

.result{margin-top:8px;}

.section{
  margin-top:8px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.info-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:8px;
}

.info-label{
  font-size:9.5px;
  color:#888;
}

.info-value{
  font-size:11.5px;
  font-weight:700;
}

.package-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px;
  margin-bottom:6px;
}

.package-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.package-name{
  font-size:11.8px;
  font-weight:800;
}

.package-date{
  font-size:10px;
  color:#777;
}

.quota-item{
  border-top:1px solid #eee;
  padding-top:8px;
  margin-top:8px;
}

.quota-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.quota-name{
  font-size:10.5px;
  font-weight:700;
}

.quota-amount{
  font-size:10px;
  color:#555;
  font-weight:600;
}

.progress{
  height:6px;
  background:#ddd;
  border-radius:999px;
}

.bar{
  height:100%;
  border-radius:999px;
}

.bar.green{background:var(--green);}
.bar.yellow{background:var(--yellow);}
.bar.red{background:var(--red);}

.footer{
  text-align:center;
  font-size:10px;
  color:#999;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <div class="hero-icon">
    <i class="fa-solid fa-signal"></i>
  </div>
  <div>
    <div class="hero-title">Cek Kuota XL & AXIS</div>
    <div class="hero-sub">by XC-Store Apps</div>
  </div>
</div>

<div class="card">
  <div class="input-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="nomor" placeholder="Masukkan nomor..." />
  </div>

  <button onclick="cek()" id="btnCek">
    <i class="fa-solid fa-paper-plane"></i> Cek Kuota
  </button>

  <div id="result" class="result"></div>
</div>

<div class="footer">Powered by XC-Store</div>

</div>

<script>
function normalizeNumber(input){
  let n = input.replace(/\D/g,'');
  if(n.startsWith('0')) n = '62' + n.slice(1);
  return n;
}

function toggleDetail(){
  const el = document.getElementById('detailSubs');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function infoCard(label,val){
  return `<div class="info-card">
    <div class="info-label">${label}</div>
    <div class="info-value">${val}</div>
  </div>`;
}

function getColor(p){
  if(p<=20) return 'red';
  if(p<=60) return 'yellow';
  return 'green';
}

async function cek(){
  const nomor = normalizeNumber(document.getElementById('nomor').value);
  const resBox = document.getElementById('result');
  const btn = document.getElementById('btnCek');

  btn.disabled=true;
  btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>';

  const res = await fetch('/api/cek?number='+nomor);
  const data = await res.json();

  const s = data.data.subs_info;
  const v = s.volte;
  const packages = data.data.package_info.packages;

  resBox.innerHTML = `
    <div class="section">
      <div style="font-size:11.5px;font-weight:700;display:flex;justify-content:space-between;">
        <div>${s.msisdn} • ${s.operator} • ${s.net_type}</div>
        <div onclick="toggleDetail()" style="font-size:10px;color:#666;cursor:pointer;">Detail</div>
      </div>

      <div id="detailSubs" style="display:none;margin-top:6px;">
        <div class="grid">
          ${infoCard('Registrasi',s.id_verified)}
          ${infoCard('Umur',s.tenure)}
          ${infoCard('Aktif',s.exp_date)}
          ${infoCard('Tenggang',s.grace_until)}
          ${infoCard('Volte Area',v.area?'Ya':'Tidak')}
          ${infoCard('Volte SIM',v.simcard?'Ya':'Tidak')}
          ${infoCard('Volte Device',v.device?'Ya':'Tidak')}
        </div>
      </div>
    </div>

    <div class="section">
      <div style="font-size:11.5px;font-weight:800;margin-bottom:6px;">
        Paket Data
      </div>

      ${packages.map(p=>{
        return `
        <div class="package-card">
          <div class="package-head">
            <div class="package-name">${p.name}</div>
            <div class="package-date">${p.expiry}</div>
          </div>

          ${p.quotas.map(q=>{
            const percent=parseFloat(q.percent)||0;
            return `
            <div class="quota-item">
              <div class="quota-row">
                <div class="quota-name">${q.name}</div>
                <div class="quota-amount">${q.remaining} / ${q.total}</div>
              </div>

              <div class="progress">
                <div class="bar ${getColor(percent)}" style="width:${percent}%"></div>
              </div>
            </div>`;
          }).join('')}

        </div>`;
      }).join('')}
    </div>
  `;

  btn.disabled=false;
  btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Cek Kuota';
}
</script>

</body>
</html>
