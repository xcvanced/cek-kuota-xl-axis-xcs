<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#efeff2;
  --card:#ffffff;
  --text:#111;
  --muted:#8f8f8f;
  --line:#e6e6e6;
  --soft:#f7f7f8;
}

body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  padding:14px;
}

.wrap{max-width:420px;margin:auto;}

.hero{
  background:#fff;
  border-radius:22px;
  padding:14px;
  display:flex;
  gap:12px;
  margin-bottom:12px;
}

.hero-icon{
  width:52px;height:52px;
  background:#111;color:#fff;
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
}

.hero-title{font-size:13.5px;font-weight:800;}
.hero-sub{font-size:11px;color:#888;}

.card{
  background:#fff;
  border-radius:22px;
  padding:14px;
}

.input-box{position:relative;margin-bottom:10px;}

.input-box i{
  position:absolute;
  left:14px;top:50%;
  transform:translateY(-50%);
  font-size:12px;color:#aaa;
}

input{
  width:100%;height:44px;
  border-radius:16px;
  border:1px solid var(--line);
  padding:0 14px 0 40px;
  font-size:12.5px;
}

button{
  width:100%;height:46px;
  border:none;border-radius:18px;
  background:#111;color:#fff;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  gap:6px;
}

.result{margin-top:10px;}

.section{
  margin-top:10px;
  background:var(--soft);
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.info-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
}

.info-label{font-size:10px;color:#888;}
.info-value{font-size:12.5px;font-weight:700;}

.package-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  margin-bottom:8px;
}

.package-name{
  font-size:12.5px;
  font-weight:800;
  margin-bottom:6px;
}

.package-meta{
  font-size:10.5px;
  color:#666;
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.progress{
  height:8px;
  background:#ddd;
  border-radius:999px;
}

.bar{
  height:100%;
  background:#111;
  border-radius:999px;
}

.footer{
  text-align:center;
  font-size:11px;
  color:#999;
  margin-top:14px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <div class="hero-icon">
    <i class="fa-solid fa-signal"></i>
  </div>
  <div>
    <div class="hero-title">Cek Kuota XL & AXIS</div>
    <div class="hero-sub">by XC-Store Apps</div>
  </div>
</div>

<div class="card">
  <div class="input-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input id="nomor" placeholder="Masukkan nomor..." />
  </div>

  <button onclick="cek()" id="btnCek">
    <i class="fa-solid fa-paper-plane"></i> Cek Kuota
  </button>

  <div id="result" class="result"></div>
</div>

<div class="footer">Powered by XC-Store</div>

</div>

<script>
function normalizeNumber(input){
  let n = input.replace(/\D/g,'');
  if(n.startsWith('0')) n = '62' + n.slice(1);
  return n;
}

function toggleDetail(){
  const el = document.getElementById('detailSubs');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function infoCard(label,val){
  return `<div class="info-card">
    <div class="info-label">${label}</div>
    <div class="info-value">${val}</div>
  </div>`;
}

async function cek(){
  const nomor = normalizeNumber(document.getElementById('nomor').value);
  const resBox = document.getElementById('result');
  const btn = document.getElementById('btnCek');

  if(!nomor) return;

  btn.disabled=true;
  btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>';

  const res = await fetch('/api/cek?number='+nomor);
  const data = await res.json();

  const s = data.data.subs_info;
  const v = s.volte;
  const packages = data.data.package_info.packages;

  resBox.innerHTML = `
    
    <!-- COMPACT INFO -->
    <div class="section">
      <div style="font-size:12px;font-weight:700;display:flex;justify-content:space-between;">
        <div>${s.msisdn} • ${s.operator} • ${s.net_type}</div>
        <div onclick="toggleDetail()" style="font-size:11px;color:#666;cursor:pointer;">
          Detail
        </div>
      </div>

      <div id="detailSubs" style="display:none;margin-top:8px;">
        <div class="grid">
          ${infoCard('Registrasi', s.id_verified)}
          ${infoCard('Umur', s.tenure)}
          ${infoCard('Masa Aktif', s.exp_date)}
          ${infoCard('Tenggang', s.grace_until)}
          ${infoCard('Volte Area', v.area?'Ya':'Tidak')}
          ${infoCard('Volte SIM', v.simcard?'Ya':'Tidak')}
          ${infoCard('Volte Device', v.device?'Ya':'Tidak')}
        </div>
      </div>
    </div>

    <!-- PAKET -->
    <div class="section">
      <div style="font-size:12px;font-weight:800;margin-bottom:8px;">
        Paket Data
      </div>

      ${packages.map(p=>{
        const q = p.quotas[0];
        return `
          <div class="package-card">
            <div class="package-name">${p.name}</div>

            <div class="package-meta">
              <div>${p.expiry}</div>
              <div>Sisa: ${q.remaining} / ${q.total}</div>
            </div>

            <div class="progress">
              <div class="bar" style="width:${q.percent}%"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  btn.disabled=false;
  btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Cek Kuota';
}
</script>

</body>
</html>
